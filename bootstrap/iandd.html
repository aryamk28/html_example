<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-4">

        <h1 class="text-danger text-center">FLOAT UTILITIES</h1>
        <br><br>
        <h3 class="text-success">1. SHADOW</h3>
        <div class="shadow-lg">1.1 LARGE</div>
        <br>
        <div class="shadow">1.2 DEFAULT</div>
        <br>
        <div class="shadow-sm">1.3 SMALL</div>
        <br>
        <div class="shadow-none">1.4 NONE</div>
        <br><br><br><br>
        <h1 class="text-danger text-center">CURSOR UTILITIES</h1>
        <br><br>
        <h3 class="text-success">1. CURSOR POINTER</h3>
        <br>
        <button class="cursor-pointer bg-black text-white">CLICKABLE</button>
        <br><br><br>
        <h3 class="text-success ">2. CURSOR DEFAULT</h3>
        <br>
        <span class="cursor-default bg-secondary">NORMAL TEXT</span>
        <br><br><br><br>
        <h1 class="text-danger text-center">OPACITY</h1>
        <br><br>
        <div class="opacity-0 bg-success p-2 text-white">0% VISIBLE</div>
        <div class="opacity-25 bg-success p-2 text-white">25% VISIBLE</div>
        <div class="opacity-50 bg-success p-2 text-white">50% VISIBLE</div>
        <div class="opacity-75 bg-success p-2 text-white">75% VISIBLE</div>
        <div class="opacity-100 bg-success p-2 text-white">100% VISIBLE</div>
        <br><br><br><br>
        <h1 class="text-danger text-center">Z-INDEX</h1>
        <br><br>
        <div class="position-relative" style="height: 200px;">
            <div class="position-absolute top-0 start-0 bg-secondary z-3 p-3" style="left: 20px;">Z-3</div>
            <div class="position-absolute top-50 start-50 translate-middle bg-info z-1 p-3" style="left: 20px;">
                Z-1</div>
            <div class="position-absolute top-100 start-100 translate-middle bg-primary z-0 p-3" style="left: 20px;">
                Z-0</div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
